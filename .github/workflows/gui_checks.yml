name: GUI Checks

on:
  pull_request:
  push:
    branches:
      - master
      - main

jobs:
  flutter-gui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gui/csvons_gui
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: GUI check suite (Makefile)
        run: make check

  go-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Go test
        run: go test ./...
